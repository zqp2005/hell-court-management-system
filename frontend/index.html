<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地府生死簿管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    /* SVG 噪点滤镜 — 全局复用 */
    .noise-overlay {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      opacity: 0.035;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .noise-overlay::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(139,0,0,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.5) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 30%, rgba(255,215,0,0.015) 0%, transparent 40%);
    }
    /* 纸质纤维纹理 */
    .paper-texture {
      position: fixed; inset: 0; z-index: 9998; pointer-events: none;
      opacity: 0.04;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(139,119,90,0.3) 2px, rgba(139,119,90,0.3) 3px
      ),
      repeating-linear-gradient(
        90deg, transparent, transparent 3px,
        rgba(139,90,43,0.2) 3px, rgba(139,90,43,0.2) 4px
      );
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="paper-texture" aria-hidden="true"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
